name: Backend Check

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'

jobs:
  backend-check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: solo_ecommerce_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/solo_ecommerce_test?schema=public
      JWT_ACCESS_SECRET: ci-test-access-secret-min-32-characters-long
      JWT_REFRESH_SECRET: ci-test-refresh-secret-min-32-characters-long
      NODE_ENV: test
      REDIS_HOST: localhost
      REDIS_PORT: 6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Push schema to test database
        working-directory: backend
        run: npx prisma db push --accept-data-loss

      - name: Lint
        working-directory: backend
        run: npm run lint

      - name: Unit tests
        working-directory: backend
        run: npm run test -- --passWithNoTests

      - name: Build
        working-directory: backend
        run: npm run build
